<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apinya Laundry</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --p900: #1E0A3C; --p800: #2D1060; --p700: #3D1880;
  --p600: #5B2D9E; --p500: #7B4DBE; --p400: #9B6DD8;
  --p200: #D4B8F0; --p100: #EDE0FF; --p50: #F7F2FF;
  --cream: #FBF7EE; --gold: #C8943A;
  --text: #1A0A33; --text2: #4A3A6A; --text3: #8A7AAA;
  --white: #FFFFFF; --bg: #F0EBF8;
  --green: #0F5C38; --green-bg: #E3F5EC; --green-b: #8FDAB8;
  --red: #7A1020; --red-bg: #FCEAED; --red-b: #F5A8B5;
  --amber: #6A3E00; --amber-bg: #FEF0D0; --amber-b: #F0C860;
  --border: #E2D8F5;
  --sh: 0 2px 16px rgba(60,20,120,0.09);
  --sh-sm: 0 1px 6px rgba(60,20,120,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--p900) 0%,var(--p700) 50%,var(--p500) 100%);}
.login-box{background:var(--white);border-radius:24px;padding:36px 32px;width:90%;max-width:360px;box-shadow:0 20px 60px rgba(30,10,60,0.4);text-align:center;}
.login-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--p200);margin:0 auto 16px;display:block;}
.login-title{font-family:'Prompt',sans-serif;font-size:20px;font-weight:700;color:var(--p800);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
.login-input{width:100%;padding:12px 16px;font-size:15px;border:2px solid var(--border);border-radius:12px;font-family:'Sarabun',sans-serif;color:var(--text);background:var(--p50);text-align:center;letter-spacing:0.1em;margin-bottom:12px;transition:all 0.2s;}
.login-input:focus{outline:none;border-color:var(--p500);box-shadow:0 0 0 3px rgba(91,45,158,0.15);}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--p700),var(--p500));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Prompt',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(91,45,158,0.4);transition:all 0.2s;}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,45,158,0.5);}
.login-err{color:var(--red);font-size:13px;margin-top:8px;min-height:20px;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--p900) 0%,var(--p700) 55%,var(--p600) 100%);padding:0 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;height:60px;box-shadow:0 2px 20px rgba(30,10,60,0.4);}
.logo-ring{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);overflow:hidden;flex-shrink:0;background:var(--p200);}
.logo-ring img{width:100%;height:100%;object-fit:cover;}
.htext h1{font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:0.02em;}
.htext p{font-size:10px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.07em;}
.hbadge{margin-left:auto;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 10px;font-size:10px;color:rgba(255,255,255,0.85);white-space:nowrap;}
.hlogout{margin-left:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:5px 10px;font-size:11px;color:rgba(255,255,255,0.7);cursor:pointer;font-family:'Sarabun',sans-serif;}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99;box-shadow:var(--sh-sm);}
.tab{flex:1;padding:12px 4px;font-size:12px;font-family:'Sarabun',sans-serif;cursor:pointer;border:none;background:none;color:var(--text3);font-weight:500;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
.tab.active{color:var(--p600);border-bottom-color:var(--p600);font-weight:700;}

.section{display:none;padding:14px;max-width:600px;margin:0 auto;}
.section.active{display:block;}

/* SECTION HEAD */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.sh-bar{width:4px;height:20px;background:var(--p600);border-radius:4px;}
.sh h2{font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;color:var(--p800);}

/* FORM */
.fc{background:var(--white);border-radius:16px;padding:16px;box-shadow:var(--sh-sm);border:1px solid var(--border);margin-bottom:10px;}
.fc-t{font-family:'Prompt',sans-serif;font-size:11px;font-weight:600;color:var(--p500);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ff{grid-column:1/-1;}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.f input,.f textarea{padding:9px 12px;font-size:13px;border:1.5px solid var(--border);border-radius:10px;background:var(--p50);color:var(--text);width:100%;font-family:'Sarabun',sans-serif;transition:all 0.2s;}
.f input:focus,.f textarea:focus{outline:none;border-color:var(--p400);background:var(--white);box-shadow:0 0 0 3px rgba(91,45,158,0.1);}
.f textarea{resize:vertical;min-height:64px;}
.rg{display:flex;gap:6px;flex-wrap:wrap;}
.rb{padding:6px 13px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;background:var(--p50);color:var(--text2);font-family:'Sarabun',sans-serif;transition:all 0.18s;font-weight:500;}
.rb.on{background:var(--p600);color:#fff;border-color:var(--p600);font-weight:600;box-shadow:0 2px 8px rgba(91,45,158,0.3);}

.btn-main{background:linear-gradient(135deg,var(--p700),var(--p500));color:#fff;border:none;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;font-family:'Prompt',sans-serif;box-shadow:0 4px 14px rgba(91,45,158,0.35);transition:all 0.2s;}
.btn-main:hover{transform:translateY(-1px);}
.btn-main:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* PHOTO BOX */
.parea{display:flex;align-items:center;gap:12px;}
.pbox{width:72px;height:72px;background:var(--p50);border-radius:12px;border:2px dashed var(--p400);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden;font-size:24px;color:var(--p400);transition:all 0.2s;}
.pbox:hover{border-color:var(--p600);background:var(--p100);}
.pbox img{width:100%;height:100%;object-fit:cover;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--white);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--border);box-shadow:var(--sh-sm);}
.stat-n{font-family:'Prompt',sans-serif;font-size:28px;font-weight:700;color:var(--p600);line-height:1;}
.stat-l{font-size:10px;color:var(--text3);margin-top:3px;font-weight:500;}

/* CHIPS */
.chips{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.chip{padding:5px 12px;font-size:11px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;background:var(--white);color:var(--text3);font-family:'Sarabun',sans-serif;font-weight:600;transition:all 0.18s;}
.chip.on{background:var(--p600);color:#fff;border-color:var(--p600);}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:var(--sh-sm);}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.cname{font-family:'Prompt',sans-serif;font-weight:600;font-size:15px;color:var(--p800);}
.csub{font-size:10px;color:var(--text3);margin-top:2px;}
.ccon{font-size:11px;color:var(--p500);margin-top:2px;font-weight:500;}
.bgs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.bg{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.bg-p{background:var(--amber-bg);color:var(--amber);}
.bg-d{background:var(--green-bg);color:var(--green);}
.bg-u{background:var(--red-bg);color:var(--red);}
.bg-t{background:var(--p100);color:var(--p700);}
.bg-up{background:var(--red-bg);color:var(--red);}
.bg-pd{background:var(--green-bg);color:var(--green);}
.cdet{font-size:12px;color:var(--text2);margin-bottom:2px;line-height:1.5;}
.cnote{font-size:11px;color:var(--text3);}
.cprice{font-size:13px;font-weight:700;color:var(--text);margin-top:6px;display:flex;align-items:center;gap:8px;}
.btn-ep{border:none;background:none;color:var(--text3);cursor:pointer;text-decoration:underline;font-size:10px;font-family:'Sarabun',sans-serif;}
.photos-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.photo-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
.photo-item span{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;}
.pthumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:transform 0.2s;}
.pthumb:hover{transform:scale(1.05);}
.upload-done-btn{padding:5px 10px;font-size:11px;border:1.5px solid var(--p400);border-radius:8px;background:var(--p50);color:var(--p600);cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600;}
.div{border:none;border-top:1px solid var(--border);margin:10px 0;}
.cact{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.btn-s{padding:6px 12px;font-size:11px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--p50);color:var(--text2);font-family:'Sarabun',sans-serif;font-weight:600;transition:all 0.18s;}
.btn-s:hover{background:var(--p100);}
.btn-done{background:var(--green-bg);color:var(--green);border-color:var(--green-b);}
.btn-pay{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b);}
.btn-del{color:var(--text3);margin-left:auto;background:transparent;border-color:transparent;}
.btn-del:hover{color:var(--red);background:var(--red-bg);}

/* TRACK */
.tbox{background:var(--white);border-radius:16px;padding:14px;border:1px solid var(--border);box-shadow:var(--sh-sm);margin-bottom:12px;}
.tsearch{display:flex;gap:8px;}
.tsearch input{flex:1;padding:10px 13px;font-size:13px;border:1.5px solid var(--border);border-radius:10px;font-family:'Sarabun',sans-serif;background:var(--p50);color:var(--text);transition:all 0.2s;}
.tsearch input:focus{outline:none;border-color:var(--p400);box-shadow:0 0 0 3px rgba(91,45,158,0.1);}
.tsearch button{padding:10px 16px;font-size:13px;background:linear-gradient(135deg,var(--p700),var(--p500));color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:'Prompt',sans-serif;font-weight:700;}
.link-box{background:var(--p50);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--p700);}
.link-box strong{display:block;margin-bottom:4px;color:var(--p800);}
.link-url{font-size:11px;color:var(--p500);word-break:break-all;font-weight:500;}

/* SHOP INFO */
.ic{background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:var(--sh-sm);}
.ih{background:linear-gradient(135deg,var(--p800),var(--p600));padding:11px 14px;font-family:'Prompt',sans-serif;font-size:12px;color:#fff;font-weight:600;letter-spacing:0.04em;}
.ib{padding:2px 0;}
.ir{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.ir:last-child{border-bottom:none;}
.ii{width:34px;height:34px;background:var(--p50);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--border);}
.il{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;}
.iv{font-size:13px;color:var(--text);font-weight:700;margin-top:1px;}
.is{font-size:10px;color:var(--text3);margin-top:1px;}
.btn-map{display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 28px);margin:4px 14px 12px;padding:11px;background:linear-gradient(135deg,var(--p700),var(--p500));color:#fff;border:none;border-radius:11px;font-size:13px;font-weight:700;font-family:'Prompt',sans-serif;cursor:pointer;text-decoration:none;box-shadow:0 3px 10px rgba(91,45,158,0.3);}
.qr-w{display:flex;justify-content:center;padding:6px 14px 14px;}
.qr-img{width:160px;height:160px;object-fit:contain;border-radius:12px;border:1.5px solid var(--border);}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;white-space:nowrap;font-family:'Sarabun',sans-serif;box-shadow:0 4px 14px rgba(0,0,0,0.12);}
.toast.ok{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-b);}
.toast.err{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-b);}
.toast.show{opacity:1;}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);}
.ei{font-size:36px;margin-bottom:6px;}
.loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px;}
.ready-box{margin-top:8px;padding:9px 12px;background:var(--green-bg);border-radius:9px;border:1px solid var(--green-b);font-size:12px;color:var(--green);font-weight:700;}

/* CUSTOMER VIEW */
.cv-head{background:linear-gradient(135deg,var(--p900),var(--p600));padding:28px 20px 20px;text-align:center;}
.cv-head img{width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,255,255,0.3);object-fit:cover;margin-bottom:10px;}
.cv-head h1{font-family:'Prompt',sans-serif;color:#fff;font-size:18px;font-weight:700;}
.cv-head p{color:rgba(255,255,255,0.65);font-size:11px;margin-top:3px;letter-spacing:0.05em;}
.cv-body{padding:14px;max-width:600px;margin:0 auto;}
.cv-contact{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:12px 14px;text-align:center;margin-top:12px;font-size:13px;color:var(--text2);}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbwOcMKOI46cG6R7i4ZaMBCPlVbRM0-gueqYOpSjIkPmV-0MUE1NyLXcp7TJKJcfSkeh/exec';
const LOGO='https://raw.githubusercontent.com/Peachylochy/laundry/main/Apinyalaundry_logo.png';
const QR='https://raw.githubusercontent.com/Peachylochy/laundry/main/qr_payment.jpg';
const WASH={wash_normal:'ซักรีดธรรมดา',wash_dry:'ซักแห้ง',wash_hand:'ซักมือ'};
const DELIVERY={pickup:'รับเองที่ร้าน',office:'ส่งให้ลูกค้า'};

let orders=[],filter='all',photoData=null,sel={wash:'wash_normal',urgent:'false',delivery:'pickup'};
const params=new URLSearchParams(window.location.search);
const isCustomer=params.get('view')==='customer';
const customerName=params.get('name')||'';

// ---- TOAST ----
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),3000);
}

// ---- API ----
async function apiGet(p){
  const r=await fetch(API+'?'+new URLSearchParams(p).toString());
  return r.json();
}
async function apiPost(p){
  const r=await fetch(API,{method:'POST',body:JSON.stringify(p)});
  return r.json();
}

// ---- INIT ----
if(isCustomer){
  renderCustomer();
} else {
  const saved=sessionStorage.getItem('al_auth');
  if(saved==='1') renderAdmin();
  else renderLogin();
}

// ---- LOGIN ----
function renderLogin(){
  document.getElementById('root').innerHTML=`
    <div class="login-wrap">
      <div class="login-box">
        <img src="${LOGO}" class="login-logo" onerror="this.style.display='none'" />
        <div class="login-title">อภิญญา ซัก อบ รีด</div>
        <div class="login-sub">Apinya Laundry · Admin</div>
        <input type="password" class="login-input" id="pw" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()" />
        <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
        <div class="login-err" id="lerr"></div>
      </div>
    </div>`;
}
async function doLogin(){
  const pw=document.getElementById('pw').value;
  const data=await apiGet({action:'login',password:pw});
  if(data.success){
    sessionStorage.setItem('al_auth','1');
    renderAdmin();
  } else {
    document.getElementById('lerr').textContent=data.error||'รหัสผ่านไม่ถูกต้อง';
  }
}

// ---- ADMIN ----
function renderAdmin(){
  document.getElementById('root').innerHTML=`
    <div class="header">
      <div class="logo-ring"><img src="${LOGO}" onerror="this.parentElement.style.background='var(--p500)';this.style.display='none'"/></div>
      <div class="htext"><h1>อภิญญา ซัก อบ รีด</h1><p>Apinya Laundry · Admin</p></div>
      <div class="hbadge">064-253-7741</div>
      <button class="hlogout" onclick="logout()">ออก</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="sw('add')">+ รับผ้า</button>
      <button class="tab" onclick="sw('list')">รายการ</button>
      <button class="tab" onclick="sw('track')">สถานะ</button>
      <button class="tab" onclick="sw('shop')">ร้านค้า</button>
    </div>

    <!-- ADD -->
    <div id="tab-add" class="section active">
      <div class="sh"><div class="sh-bar"></div><h2>บันทึกรับผ้าใหม่</h2></div>
      <div class="fc">
        <div class="fc-t">ข้อมูลลูกค้า</div>
        <div class="fg">
          <div class="f"><label>ชื่อลูกค้า *</label><input id="owner" placeholder="เช่น พี่นิด"/></div>
          <div class="f"><label>จากที่ไหน</label><input id="source" placeholder="เช่น ออฟฟิศ"/></div>
          <div class="f"><label>เบอร์โทร</label><input id="phone" type="tel" placeholder="081-xxx-xxxx"/></div>
          <div class="f"><label>Line ID</label><input id="lineid" placeholder="@line_id"/></div>
        </div>
      </div>
      <div class="fc">
        <div class="fc-t">รายละเอียดผ้า</div>
        <div class="fg">
          <div class="f"><label>วันที่รับผ้า</label><input id="pickup-date" type="date"/></div>
          <div class="f ff"><label>รายละเอียด *</label><input id="desc" placeholder="เช่น เสื้อเชิ้ต 3 ตัว กางเกง 1 ตัว"/></div>
          <div class="f ff"><label>ประเภทการซัก</label>
            <div class="rg" id="rg-wash">
              <span class="rb on" onclick="pick('rg-wash',this,'wash_normal')">ซักรีดธรรมดา</span>
              <span class="rb" onclick="pick('rg-wash',this,'wash_dry')">ซักแห้ง</span>
              <span class="rb" onclick="pick('rg-wash',this,'wash_hand')">ซักมือ</span>
            </div>
          </div>
          <div class="f ff"><label>ความเร่งด่วน</label>
            <div class="rg" id="rg-urgent">
              <span class="rb on" onclick="pick('rg-urgent',this,'false')">ปกติ</span>
              <span class="rb" onclick="pick('rg-urgent',this,'true')">🔴 ด่วน</span>
            </div>
          </div>
          <div class="f ff"><label>การรับผ้าคืน</label>
            <div class="rg" id="rg-delivery">
              <span class="rb on" onclick="pick('rg-delivery',this,'pickup')">รับเองที่ร้าน</span>
              <span class="rb" onclick="pick('rg-delivery',this,'office')">ส่งให้ลูกค้า</span>
            </div>
          </div>
          <div class="f ff"><label>รูปผ้า (ก่อนซัก)</label>
            <div class="parea">
              <div class="pbox" id="photo-preview" onclick="document.getElementById('photo-input').click()">📷</div>
              <div>
                <p style="font-size:12px;color:var(--text2);margin-bottom:3px;" id="photo-name">ยังไม่ได้เลือกรูป</p>

// ---- FORM ----
function pick(g,el,v){
  document.querySelectorAll('#'+g+' .rb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(g==='rg-wash')sel.wash=v;
  if(g==='rg-urgent')sel.urgent=v;
  if(g==='rg-delivery')sel.delivery=v;
}
function clearPhoto(){
  photoData=null;
  document.getElementById('photo-preview').innerHTML='📷';
  document.getElementById('photo-name').textContent='ยังไม่ได้เลือกรูป';
  document.getElementById('btn-rp').style.display='none';
  document.getElementById('photo-input').value='';
}
function resizeImg(dataUrl,max,cb){
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.75));
  };
  img.src=dataUrl;
}
function previewPhoto(input){
  if(input.files&&input.files[0]){
    const file=input.files[0];
    document.getElementById('photo-name').textContent=file.name;
    const reader=new FileReader();
    reader.onload=e=>{
      resizeImg(e.target.result,900,resized=>{
        photoData=resized;
        document.getElementById('photo-preview').innerHTML='<img src="'+resized+'"/>';
        document.getElementById('btn-rp').style.display='inline-block';
      });
    };
    reader.readAsDataURL(file);
  }
}

async function addOrder(){
  const owner=document.getElementById('owner').value.trim();
  const desc=document.getElementById('desc').value.trim();
  if(!owner||!desc){toast('กรุณากรอกชื่อและรายละเอียดผ้าค่ะ','err');return;}
  const btn=document.getElementById('btn-add');
  btn.disabled=true;btn.textContent=photoData?'กำลังอัปโหลดรูปและบันทึก...':'กำลังบันทึก...';
  try{
    const data=await apiPost({
      action:'add',
      owner, source:document.getElementById('source').value.trim(),
      phone:document.getElementById('phone').value.trim(),
      lineid:document.getElementById('lineid').value.trim(),
      desc, date:document.getElementById('pickup-date').value,
      wash:sel.wash, urgent:sel.urgent, delivery:sel.delivery,
      note:document.getElementById('note').value.trim(),
      photo:photoData||''
    });
    if(data.success){
      toast('✓ บันทึกแล้วค่ะ! รหัส: '+data.id);
      ['owner','source','phone','lineid','desc','note'].forEach(id=>document.getElementById(id).value='');
      clearPhoto();
      ['rg-wash','rg-urgent','rg-delivery'].forEach(g=>document.querySelectorAll('#'+g+' .rb').forEach((b,i)=>b.classList.toggle('on',i===0)));
      sel={wash:'wash_normal',urgent:'false',delivery:'pickup'};
      sw('list');
    }else{toast('เกิดข้อผิดพลาด: '+(data.error||'unknown'),'err');}
  }catch(e){toast('เชื่อมต่อไม่ได้ค่ะ','err');}
  btn.disabled=false;btn.textContent='✓ บันทึกรายการผ้า';
}

// ---- LIST ----
async function loadOrders(){
  const el=document.getElementById('order-list');
  if(el)el.innerHTML='<div class="loading">กำลังโหลด...</div>';
  try{
    const data=await apiGet({action:'list'});
    orders=data.orders||[];renderList();
  }catch(e){if(el)el.innerHTML='<div class="empty"><div class="ei">📡</div><p>เชื่อมต่อไม่ได้ค่ะ</p></div>';}
}
function setF(f,el){
  filter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');renderList();
}
function getF(){
  if(filter==='all')return orders;
  if(filter==='pending')return orders.filter(o=>o.status==='pending');
  if(filter==='done')return orders.filter(o=>o.status==='done');
  if(filter==='urgent')return orders.filter(o=>String(o.urgent)==='true');
  if(filter==='unpaid')return orders.filter(o=>String(o.paid)!=='true');
  return orders;
}
function fmtDate(d){
  if(!d)return'';
  const s=String(d);
  if(s.includes('T')){const dt=new Date(s);return dt.toLocaleDateString('th-TH');}
  return s;
}
function renderList(){
  const done=orders.filter(o=>o.status==='done').length;
  document.getElementById('st-total').textContent=orders.length;
  document.getElementById('st-pending').textContent=orders.length-done;
  document.getElementById('st-unpaid').textContent=orders.filter(o=>String(o.paid)!=='true').length;
  const list=getF();
  const el=document.getElementById('order-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">🧺</div><p>ไม่มีรายการในหมวดนี้ค่ะ</p></div>';return;}
  el.innerHTML=list.sort((a,b)=>(String(b.urgent)==='true')-(String(a.urgent)==='true')).map(o=>cardHTML(o,true)).join('');
}
function cardHTML(o,isAdmin){
  const pin=o.photo_in&&String(o.photo_in).startsWith('http');
  const pdone=o.photo_done&&String(o.photo_done).startsWith('http');
  return`<div class="card">
    <div class="ctop">
      <div>
        <div class="cname">${o.owner}</div>
        <div class="csub">${o.id}${o.source?' · '+o.source:''} · ${fmtDate(o.date)}</div>
        ${o.phone||o.lineid?`<div class="ccon">${o.phone?'📞 '+o.phone:''}${o.phone&&o.lineid?' · ':''}${o.lineid?'Line: '+o.lineid:''}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
        <span class="bg ${o.status==='done'?'bg-d':'bg-p'}">${o.status==='done'?'✓ เสร็จแล้ว':'⏳ กำลังดำเนินการ'}</span>
        ${String(o.urgent)==='true'?'<span class="bg bg-u">🔴 ด่วน</span>':''}
      </div>
    </div>
    <div class="bgs">
      <span class="bg bg-t">${WASH[o.wash]||o.wash}</span>
      <span class="bg bg-t">${DELIVERY[o.delivery]||o.delivery}</span>
      <span class="bg ${String(o.paid)==='true'?'bg-pd':'bg-up'}">${String(o.paid)==='true'?'✓ เก็บเงินแล้ว':(o.price&&o.price!='0'?'💰 ค้างชำระ ฿'+o.price:'รอประเมินราคา')}</span>
    </div>
    <div class="cdet">${o.desc}</div>
    ${o.note?`<div class="cnote">📝 ${o.note}</div>`:''}
    ${pin||pdone?`<div class="photos-row">
      ${pin?`<div class="photo-item"><span>ก่อนซัก</span><a href="${o.photo_in}" target="_blank"><img src="${o.photo_in}" class="pthumb"/></a></div>`:''}
      ${pdone?`<div class="photo-item"><span>หลังซัก</span><a href="${o.photo_done}" target="_blank"><img src="${o.photo_done}" class="pthumb"/></a></div>`:''}
    </div>`:''}
    ${isAdmin?`
    <div class="cprice">ราคา: ฿${o.price||0} <button class="btn-ep" onclick="editPrice('${o.id}')">แก้ไขราคา</button></div>
    <hr class="div"/>
    <div class="cact">
      ${o.status==='pending'?`<button class="btn-s btn-done" onclick="upd('${o.id}','status','done')">✓ เสร็จแล้ว</button>`:`<button class="btn-s" onclick="upd('${o.id}','status','pending')">ย้อนกลับ</button>`}
      ${String(o.paid)!=='true'&&o.price&&o.price!='0'?`<button class="btn-s btn-pay" onclick="upd('${o.id}','paid','true')">เก็บเงินแล้ว</button>`:''}
      ${!pdone?`<button class="upload-done-btn" onclick="uploadDonePhoto('${o.id}')">📷 แนบรูปหลังซัก</button>`:''}
      <button class="btn-s btn-del" onclick="del('${o.id}')">ลบ</button>
    </div>`:`
    <div style="font-size:12px;font-weight:700;color:var(--text);margin-top:6px;">ยอดชำระ: ฿${o.price||0} ${String(o.paid)==='true'?'<span style="color:var(--green)">(ชำระแล้ว)</span>':''}</div>
    ${o.status==='done'?`<div class="ready-box">🎉 ผ้าพร้อมรับคืนแล้วค่ะ! กรุณาติดต่อ 064-253-7741</div>`:''}
    `}
  </div>`;
}

async function editPrice(id){
  const v=prompt('กรอกราคา (บาท):');
  if(v!==null&&v.trim()!=='')upd(id,'price',v.trim());
}
async function upd(id,field,value){
  try{
    await apiGet({action:'update',id,field,value});
    const o=orders.find(x=>x.id===id);
    if(o){o[field]=value;renderList();}
    toast('✓ อัปเดตแล้วค่ะ');
  }catch(e){toast('อัปเดตไม่ได้ค่ะ','err');}
}
async function del(id){
  if(!confirm('ลบรายการนี้?'))return;
  try{
    await apiGet({action:'delete',id});
    orders=orders.filter(x=>x.id!==id);renderList();toast('ลบแล้วค่ะ');
  }catch(e){toast('ลบไม่ได้ค่ะ','err');}
}

// ---- UPLOAD DONE PHOTO ----
function uploadDonePhoto(id){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    toast('กำลังอัปโหลดรูปหลังซัก...');
    const reader=new FileReader();
    reader.onload=async ev=>{
      resizeImg(ev.target.result,900,async resized=>{
        try{
          const data=await apiPost({action:'uploadPhoto',id,type:'done',photo:resized});
          if(data.success){
            const o=orders.find(x=>x.id===id);
            if(o)o.photo_done=data.url;
            renderList();
            toast('✓ อัปโหลดรูปหลังซักแล้วค่ะ');
          }else{toast('อัปโหลดไม่ได้ค่ะ','err');}
        }catch(e){toast('เชื่อมต่อไม่ได้ค่ะ','err');}
      });
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// ---- TRACK ----
async function trackOrder(){
  const name=document.getElementById('track-name').value.trim().toLowerCase();
  const el=document.getElementById('track-result');
  if(!name){el.innerHTML='';return;}
  el.innerHTML='<div class="loading">กำลังค้นหา...</div>';
  try{
    const data=await apiGet({action:'list'});
    const res=(data.orders||[]).filter(o=>o.owner.toLowerCase().includes(name));
    if(!res.length){el.innerHTML='<div class="empty"><div class="ei">🔍</div><p>ไม่พบรายการของ "'+name+'" ค่ะ</p></div>';return;}
    el.innerHTML=res.map(o=>cardHTML(o,false)).join('');
  }catch(e){el.innerHTML='<div class="empty"><div class="ei">📡</div><p>เชื่อมต่อไม่ได้ค่ะ</p></div>';}
}

// ---- SW TAB ----
function sw(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['add','list','track','shop'][i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='list')loadOrders();
}
</script>
