<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apinya Laundry</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --p900:#1E0A3C;--p800:#2D1060;--p700:#3D1880;--p600:#5B2D9E;--p500:#7B4DBE;--p400:#9B6DD8;
  --p200:#D4B8F0;--p100:#EDE0FF;--p50:#F7F2FF;
  --text:#1A0A33;--text2:#4A3A6A;--text3:#8A7AAA;--white:#FFFFFF;--bg:#F0EBF8;
  --green:#0F5C38;--green-bg:#E3F5EC;--green-b:#8FDAB8;
  --red:#7A1020;--red-bg:#FCEAED;--red-b:#F5A8B5;
  --amber:#6A3E00;--amber-bg:#FEF0D0;--amber-b:#F0C860;
  --border:#E2D8F5;--sh:0 2px 16px rgba(60,20,120,0.09);--sh-sm:0 1px 6px rgba(60,20,120,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* COMMON */
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--p900),var(--p700) 50%,var(--p500));}
.box{background:var(--white);border-radius:24px;padding:32px;width:90%;max-width:380px;box-shadow:0 20px 60px rgba(30,10,60,0.4);text-align:center;}
.box-logo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--p200);margin:0 auto 14px;display:block;}
.box-title{font-family:'Prompt',sans-serif;font-size:20px;font-weight:700;color:var(--p800);margin-bottom:3px;}
.box-sub{font-size:13px;color:var(--text3);margin-bottom:22px;}
.inp{width:100%;padding:12px 16px;font-size:14px;border:2px solid var(--border);border-radius:12px;font-family:'Sarabun',sans-serif;color:var(--text);background:var(--p50);margin-bottom:10px;transition:all 0.2s;}
.inp:focus{outline:none;border-color:var(--p500);box-shadow:0 0 0 3px rgba(91,45,158,0.12);}
.btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--p700),var(--p500));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Prompt',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(91,45,158,0.4);transition:all 0.2s;margin-top:4px;}
.btn-main:disabled{opacity:0.5;cursor:not-allowed;}
.err-text{color:var(--red);font-size:12px;margin-top:6px;min-height:18px;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--p900),var(--p700) 55%,var(--p600));padding:0 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;height:58px;box-shadow:0 2px 20px rgba(30,10,60,0.4);}
.logo-ring{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);overflow:hidden;flex-shrink:0;background:var(--p200);}
.logo-ring img{width:100%;height:100%;object-fit:cover;}
.htext h1{font-family:'Prompt',sans-serif;font-size:13px;font-weight:700;color:#fff;}
.htext p{font-size:10px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.06em;}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hbadge{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:3px 9px;font-size:10px;color:rgba(255,255,255,0.85);}
.hbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:4px 9px;font-size:11px;color:rgba(255,255,255,0.7);cursor:pointer;font-family:'Sarabun',sans-serif;}
.status-open{background:#1a6b45;color:#fff;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}
.status-closed{background:#7a1020;color:#fff;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:99;box-shadow:var(--sh-sm);}
.tab{flex:1;padding:11px 4px;font-size:11px;font-family:'Sarabun',sans-serif;cursor:pointer;border:none;background:none;color:var(--text3);font-weight:500;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
.tab.active{color:var(--p600);border-bottom-color:var(--p600);font-weight:700;}
.section{display:none;padding:14px;max-width:640px;margin:0 auto;}
.section.active{display:block;}

/* FORM */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sh-bar{width:4px;height:18px;background:var(--p600);border-radius:4px;}
.sh h2{font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;color:var(--p800);}
.fc{background:var(--white);border-radius:14px;padding:14px;box-shadow:var(--sh-sm);border:1px solid var(--border);margin-bottom:10px;}
.fc-t{font-family:'Prompt',sans-serif;font-size:10px;font-weight:700;color:var(--p500);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.ff{grid-column:1/-1;}
.f{display:flex;flex-direction:column;gap:3px;}
.f label{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.f input,.f select,.f textarea{padding:8px 11px;font-size:13px;border:1.5px solid var(--border);border-radius:9px;background:var(--p50);color:var(--text);width:100%;font-family:'Sarabun',sans-serif;transition:all 0.2s;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--p400);background:var(--white);}
.f textarea{resize:vertical;min-height:56px;}
.rg{display:flex;gap:5px;flex-wrap:wrap;}
.rb{padding:5px 11px;border:1.5px solid var(--border);border-radius:18px;cursor:pointer;font-size:11px;background:var(--p50);color:var(--text2);font-family:'Sarabun',sans-serif;transition:all 0.18s;font-weight:500;}
.rb.on{background:var(--p600);color:#fff;border-color:var(--p600);font-weight:600;}
.btn-purple{background:linear-gradient(135deg,var(--p700),var(--p500));color:#fff;border:none;padding:11px 20px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;font-family:'Prompt',sans-serif;box-shadow:0 3px 12px rgba(91,45,158,0.3);transition:all 0.2s;}
.btn-purple:disabled{opacity:0.5;cursor:not-allowed;}

/* PRICE CALCULATOR */
.price-box{background:linear-gradient(135deg,var(--p50),var(--p100));border:1.5px solid var(--p200);border-radius:12px;padding:12px 14px;margin-top:8px;}
.price-total{font-family:'Prompt',sans-serif;font-size:22px;font-weight:700;color:var(--p700);margin-bottom:4px;}
.price-breakdown{font-size:11px;color:var(--text2);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--white);border-radius:12px;padding:10px 6px;text-align:center;border:1px solid var(--border);box-shadow:var(--sh-sm);}
.stat-n{font-family:'Prompt',sans-serif;font-size:26px;font-weight:700;color:var(--p600);line-height:1;}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px;font-weight:500;}
.chips{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.chip{padding:4px 11px;font-size:11px;border:1.5px solid var(--border);border-radius:18px;cursor:pointer;background:var(--white);color:var(--text3);font-family:'Sarabun',sans-serif;font-weight:600;}
.chip.on{background:var(--p600);color:#fff;border-color:var(--p600);}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--sh-sm);}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.cname{font-family:'Prompt',sans-serif;font-weight:600;font-size:14px;color:var(--p800);}
.csub{font-size:10px;color:var(--text3);margin-top:1px;}
.ccon{font-size:10px;color:var(--p500);margin-top:2px;font-weight:500;}
.bgs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.bg{padding:2px 7px;border-radius:18px;font-size:10px;font-weight:700;}
.bg-p{background:var(--amber-bg);color:var(--amber);}
.bg-d{background:var(--green-bg);color:var(--green);}
.bg-u{background:var(--red-bg);color:var(--red);}
.bg-t{background:var(--p100);color:var(--p700);}
.bg-up{background:var(--red-bg);color:var(--red);}
.bg-pd{background:var(--green-bg);color:var(--green);}
.bg-wait{background:#FFF8E0;color:#856400;}
.bg-w{background:#E8F0FE;color:#1a56db;}
.bg-i{background:#FFF3E0;color:#e65100;}
.bg-r{background:#E8F5E9;color:#2e7d32;}
.cdet{font-size:12px;color:var(--text2);margin-bottom:2px;line-height:1.5;}
.cnote{font-size:11px;color:var(--text3);}
.cprice{font-size:13px;font-weight:700;color:var(--text);margin-top:5px;display:flex;align-items:center;gap:6px;}
.btn-ep{border:none;background:none;color:var(--text3);cursor:pointer;text-decoration:underline;font-size:10px;font-family:'Sarabun',sans-serif;}
.photos-row{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap;}
.photo-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.photo-item span{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;}
.pthumb{width:64px;height:64px;object-fit:cover;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;}
.divider{border:none;border-top:1px solid var(--border);margin:8px 0;}
.cact{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.btn-s{padding:5px 11px;font-size:11px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;background:var(--p50);color:var(--text2);font-family:'Sarabun',sans-serif;font-weight:600;transition:all 0.15s;}
.btn-s:hover{background:var(--p100);}
.btn-done{background:var(--green-bg);color:var(--green);border-color:var(--green-b);}
.btn-pay{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-b);}
.btn-del{color:var(--text3);background:transparent;border-color:transparent;margin-left:auto;}
.btn-del:hover{color:var(--red);background:var(--red-bg);}
.upload-btn{padding:5px 10px;font-size:11px;border:1.5px solid var(--p400);border-radius:7px;background:var(--p50);color:var(--p600);cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600;}
.link-copy-box{background:var(--p50);border:1.5px solid var(--p200);border-radius:9px;padding:8px 11px;margin-top:7px;display:flex;align-items:center;gap:8px;}
.link-url{font-size:11px;color:var(--p600);word-break:break-all;font-weight:500;flex:1;}
.btn-copy{padding:4px 9px;font-size:11px;background:var(--p600);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600;white-space:nowrap;}
.pay-wait-box{margin-top:6px;padding:7px 10px;background:#FFF8E0;border-radius:8px;border:1px solid #F0C860;font-size:11px;color:#856400;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.btn-confirm{padding:4px 10px;font-size:11px;background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-b);border-radius:7px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:700;}
.hanger-warn{background:#FFF3E0;border:1px solid #FFB74D;border-radius:8px;padding:7px 10px;font-size:11px;color:#E65100;margin-top:6px;font-weight:600;}

/* STATUS STEPS */
.steps{display:flex;align-items:center;margin:8px 0;gap:0;}
.step{flex:1;text-align:center;font-size:9px;font-weight:600;color:var(--text3);position:relative;}
.step-dot{width:20px;height:20px;border-radius:50%;background:var(--border);margin:0 auto 3px;display:flex;align-items:center;justify-content:center;font-size:10px;}
.step.done .step-dot{background:var(--p600);color:#fff;}
.step.active .step-dot{background:var(--p400);color:#fff;box-shadow:0 0 0 3px var(--p100);}
.step-line{height:2px;background:var(--border);flex:1;margin-top:-13px;}
.step-line.done{background:var(--p400);}

/* SHOP */
.ic{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:9px;box-shadow:var(--sh-sm);}
.ih{background:linear-gradient(135deg,var(--p800),var(--p600));padding:10px 14px;font-family:'Prompt',sans-serif;font-size:12px;color:#fff;font-weight:600;}
.ib{padding:2px 0;}
.ir{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid var(--border);}
.ir:last-child{border-bottom:none;}
.ii{width:32px;height:32px;background:var(--p50);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.il{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;}
.iv{font-size:13px;color:var(--text);font-weight:700;margin-top:1px;}
.is{font-size:10px;color:var(--text3);}
.btn-map{display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 28px);margin:4px 14px 12px;padding:10px;background:linear-gradient(135deg,var(--p700),var(--p500));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:'Prompt',sans-serif;cursor:pointer;text-decoration:none;}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.sum-card{background:var(--white);border-radius:12px;padding:14px 12px;border:1px solid var(--border);box-shadow:var(--sh-sm);}
.sum-n{font-family:'Prompt',sans-serif;font-size:22px;font-weight:700;color:var(--p600);}
.sum-l{font-size:11px;color:var(--text3);margin-top:2px;}

/* CUSTOMER */
.cv-head{background:linear-gradient(135deg,var(--p900),var(--p600));padding:24px 20px 18px;text-align:center;}
.cv-head img{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,0.3);object-fit:cover;margin-bottom:8px;}
.cv-head h1{font-family:'Prompt',sans-serif;color:#fff;font-size:17px;font-weight:700;}
.cv-head p{color:rgba(255,255,255,0.65);font-size:10px;margin-top:2px;letter-spacing:0.05em;}
.cv-body{padding:14px;max-width:600px;margin:0 auto;}
.cv-welcome{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px 14px;margin-bottom:12px;}
.cv-name{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:var(--p800);}
.cv-type{font-size:11px;color:var(--text3);margin-top:2px;}
.cv-contact{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px 14px;text-align:center;margin-top:12px;font-size:12px;color:var(--text2);}
.ready-box{margin-top:7px;padding:8px 11px;background:var(--green-bg);border-radius:8px;border:1px solid var(--green-b);font-size:11px;color:var(--green);font-weight:700;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(30,10,60,0.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--white);border-radius:18px;padding:22px;width:100%;max-width:360px;}
.modal h3{font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;color:var(--p800);margin-bottom:14px;text-align:center;}
.modal-bank{background:var(--p50);border-radius:10px;padding:12px 14px;margin-bottom:12px;text-align:center;}
.modal-bank .amount{font-family:'Prompt',sans-serif;font-size:24px;font-weight:700;color:var(--p700);margin-bottom:6px;}
.modal-bank .bank-info{font-size:13px;color:var(--text2);line-height:1.6;}
.modal-bank .bank-no{font-size:16px;font-weight:700;color:var(--text);letter-spacing:0.05em;}
.pay-btns{display:flex;flex-direction:column;gap:7px;}
.btn-slip{width:100%;padding:11px;background:var(--p50);color:var(--p600);border:1.5px solid var(--p400);border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;}
.btn-cash{width:100%;padding:11px;background:var(--amber-bg);color:var(--amber);border:1.5px solid var(--amber-b);border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;}
.btn-close-m{width:100%;padding:9px;background:transparent;color:var(--text3);border:1.5px solid var(--border);border-radius:9px;font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif;margin-top:4px;}

/* PHOTO */
.parea{display:flex;align-items:center;gap:10px;}
.pbox{width:68px;height:68px;background:var(--p50);border-radius:11px;border:2px dashed var(--p400);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden;font-size:22px;color:var(--p400);}
.pbox img{width:100%;height:100%;object-fit:cover;}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:9px;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;white-space:nowrap;font-family:'Sarabun',sans-serif;}
.toast.ok{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-b);}
.toast.err{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-b);}
.toast.show{opacity:1;}
.empty{text-align:center;padding:2rem 1rem;color:var(--text3);}
.ei{font-size:32px;margin-bottom:5px;}
.loading{text-align:center;padding:1.5rem;color:var(--text3);font-size:12px;}

/* CUSTOMER MANAGE */
.cust-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--sh-sm);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cust-info .cn{font-family:'Prompt',sans-serif;font-size:13px;font-weight:600;color:var(--p800);}
.cust-info .cp{font-size:11px;color:var(--text3);margin-top:1px;}
.cust-type{padding:2px 8px;border-radius:18px;font-size:10px;font-weight:700;}
.type-daily{background:var(--p100);color:var(--p700);}
.type-monthly{background:var(--green-bg);color:var(--green);}

/* SHOP TOGGLE */
.shop-toggle{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px 3px 5px;cursor:pointer;transition:all 0.2s;}
.shop-toggle:active{transform:scale(0.96);}
.toggle-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all 0.3s;}
.toggle-dot.open{background:#1a6b45;box-shadow:0 0 6px rgba(26,107,69,0.7);}
.toggle-dot.closed{background:#7a1020;box-shadow:0 0 6px rgba(122,16,32,0.7);}
.toggle-label{font-size:10px;font-weight:700;color:#fff;}
/* CLOSED BANNER */
.closed-banner{background:linear-gradient(135deg,#7a1020,#b71c1c);color:#fff;padding:16px 18px;margin:12px;border-radius:12px;text-align:center;box-shadow:0 4px 16px rgba(183,28,28,0.3);}
.closed-banner-icon{font-size:28px;margin-bottom:6px;}
.closed-banner-title{font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;margin-bottom:3px;}
.closed-banner-sub{font-size:12px;opacity:0.8;}

<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<div id="modal"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbz5WvcBqMuhbRCVPLoMPuP6mtfP5ZqByf7ym74d-vsZzazAGAy3iEomljAQu9ciIXEe/exec';
const LOGO='https://raw.githubusercontent.com/Peachylochy/laundry/main/Apinyalaundry_logo.png';
const SITE='https://peachylochy.github.io/laundry';
const WASH_LABEL={wash_iron:'ซักรีด',wash_dry:'ซักแห้ง',wash_hand:'ซักมือ',iron_only:'รีดอย่างเดียว'};
const DELIVERY_LABEL={self:'รับเองที่ร้าน',mpu:'ม.พะเยา',outside:'นอกพื้นที่'};
const URGENT_LABEL={normal:'ปกติ',urgent3:'ด่วน 3 วัน (+฿20)',urgent24:'ด่วน 24ชม (+฿40)'};
const STATUS_STEPS=['pending','washing','ironing','ready'];
const STATUS_TH={pending:'รับผ้าแล้ว',washing:'กำลังซัก',ironing:'กำลังรีด',ready:'เสร็จพร้อมส่ง',done:'เสร็จแล้ว'};

let orders=[],customers=[],filter='all',photoData=null,shopOpen=true;
let sel={wash:'wash_iron',urgent:'normal',delivery:'self',delivery_time:'',hanger:'false',type:'daily'};
const urlP=new URLSearchParams(window.location.search);
const isCustomer=urlP.get('view')==='customer';
const custId=urlP.get('id')||'';
const custPhone=urlP.get('phone')||'';

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),3000);
}
async function apiGet(p){const r=await fetch(API+'?'+new URLSearchParams(p).toString());return r.json();}
async function apiPost(p){const r=await fetch(API,{method:'POST',body:JSON.stringify(p)});return r.json();}

function isOpen(){
  const now=new Date();const h=now.getHours();const m=now.getMinutes();
  const t=h*60+m;return t>=480&&t<=1170;
}

// INIT
if(isCustomer){initCustomer();}
else{const s=sessionStorage.getItem('al_auth');if(s==='1')renderAdmin();else renderAdminLogin();}

// ---- ADMIN LOGIN ----
function renderAdminLogin(){
  document.getElementById('root').innerHTML=`
  <div class="wrap"><div class="box">
    <img src="${LOGO}" class="box-logo" onerror="this.style.display='none'"/>
    <div class="box-title">อภิญญา ซัก อบ รีด</div>
    <div class="box-sub">Admin Login</div>
    <input type="password" class="inp" id="pw" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <button class="btn-main" onclick="doAdminLogin()">เข้าสู่ระบบ Admin</button>
    <div class="err-text" id="lerr"></div>
  </div></div>`;
}
async function doAdminLogin(){
  const pw=document.getElementById('pw').value;
  const d=await apiGet({action:'login',password:pw});
  if(d.success){sessionStorage.setItem('al_auth','1');renderAdmin();}
  else document.getElementById('lerr').textContent=d.error||'รหัสผ่านไม่ถูกต้อง';
}

// ---- SHOP STATUS ----
async function loadShopStatus(){
  try{const d=await apiGet({action:'getShopStatus'});shopOpen=d.open!==false;}
  catch(e){shopOpen=true;}
  updateShopToggleUI();
}
async function toggleShop(){
  const next=!shopOpen;
  try{
    await apiGet({action:'setShopStatus',open:next});
    shopOpen=next;
    updateShopToggleUI();
    toast(shopOpen?'✓ เปิดร้านแล้วค่ะ 🟢':'🔴 ปิดร้านแล้วค่ะ');
  }catch(e){toast('อัปเดตสถานะไม่ได้ค่ะ','err');}
}
function updateShopToggleUI(){
  const dot=document.getElementById('toggle-dot');
  const lbl=document.getElementById('toggle-label');
  if(dot){dot.className='toggle-dot '+(shopOpen?'open':'closed');dot.textContent=shopOpen?'🟢':'🔴';}
  if(lbl)lbl.textContent=shopOpen?'เปิดร้าน':'ปิดร้าน';
}

function customerCardHTML(o){
  const pin=o.photo_in&&String(o.photo_in).startsWith('http');
  const pdone=o.photo_done&&String(o.photo_done).startsWith('http');
  const pslip=o.slip_photo&&String(o.slip_photo).startsWith('http');
  const payWait=o.payment_method&&String(o.paid)!=='true';
  const stepIdx=STATUS_STEPS.indexOf(o.status);
  const hanger=String(o.hanger)==='true';
  return`<div class="card">
    <div class="ctop">
      <div>
        <div class="cname">${o.owner||o.nickname||''}</div>
        <div class="csub">${o.id} · ${fmtDate(o.created_at)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
        <span class="bg ${o.status==='ready'||o.status==='done'?'bg-d':'bg-p'}">${STATUS_TH[o.status]||o.status}</span>
        ${String(o.urgent)==='urgent24'||String(o.urgent)==='urgent3'?'<span class="bg bg-u">ด่วน</span>':''}
      </div>
    </div>
    ${o.status!=='done'?`<div class="steps">
      ${STATUS_STEPS.map((s,i)=>`
        ${i>0?`<div class="step-line ${i<=stepIdx?'done':''}"></div>`:''}
        <div class="step ${i<stepIdx?'done':i===stepIdx?'active':''}">
          <div class="step-dot">${i<stepIdx?'✓':i===stepIdx?'●':''}</div>
          <div>${['รับผ้า','ซัก','รีด','พร้อมส่ง'][i]}</div>
        </div>`).join('')}
    </div>`:''}
    <div class="bgs">
      <span class="bg bg-t">${WASH_LABEL[o.wash_type]||o.wash_type}</span>
      <span class="bg bg-t">${DELIVERY_LABEL[o.delivery]||o.delivery}</span>
      ${String(o.urgent)!=='normal'?`<span class="bg bg-u">${URGENT_LABEL[o.urgent]||''}</span>`:''}
    </div>
    <div class="cdet">${o.desc}</div>
    ${o.note?`<div class="cnote">📝 ${o.note}</div>`:''}
    ${hanger?`<div class="hanger-warn">🪝 กรุณาเตรียมไม้แขวนมารับผ้าด้วยนะคะ</div>`:''}
    ${pin||pdone?`<div class="photos-row">
      ${pin?`<div class="photo-item"><span>ก่อนซัก</span><a href="${o.photo_in}" target="_blank"><img src="${o.photo_in}" class="pthumb"/></a></div>`:''}
      ${pdone?`<div class="photo-item"><span>หลังซัก</span><a href="${o.photo_done}" target="_blank"><img src="${o.photo_done}" class="pthumb"/></a></div>`:''}
    </div>`:''}
    <div style="font-size:12px;font-weight:700;color:var(--text);margin-top:6px;">
      ยอดชำระ: ฿${o.price||0}
      ${String(o.paid)==='true'?'<span style="color:var(--green);margin-left:6px;">✓ ชำระแล้ว</span>':''}
    </div>
    ${(o.status==='ready'||o.status==='done')&&String(o.paid)!=='true'&&!o.payment_method?`
    <button class="btn-purple" style="margin-top:8px;padding:10px;" onclick="showPayModal('${o.id}','${o.price||0}')">💳 ชำระเงิน</button>`:''}
    ${payWait?`<div class="pay-wait-box">⏳ แจ้งชำระแล้ว รอร้านยืนยันค่ะ</div>`:''}
    ${(o.status==='ready'||o.status==='done')&&String(o.paid)==='true'?`<div class="ready-box">✅ ชำระเงินเรียบร้อยแล้วค่ะ ขอบคุณมากนะคะ 🙏</div>`:''}
  </div>`;
}

  const d=await apiGet({action:'getCustomer',phone:query});
  if(d.success){
    currentCustomer=d.customer;
    showCustomerFound(d.customer);
    return;
  }
  // ถ้าไม่เจอลองค้นด้วยชื่อ
  const d2=await apiGet({action:'listCustomers'});
  const found=(d2.customers||[]).filter(c=>
    (c.name||'').toLowerCase().includes(query.toLowerCase())||
    (c.nickname||'').toLowerCase().includes(query.toLowerCase())
  );
  if(found.length===1){
    currentCustomer=found[0];
    showCustomerFound(found[0]);
    document.getElementById('search-phone').value=found[0].phone;
  } else if(found.length>1){
    // แสดงตัวเลือก
    document.getElementById('customer-found').style.display='none';
    document.getElementById('customer-notfound').style.display='none';
    const el=document.getElementById('search-results');
    el.style.display='block';
    el.innerHTML=`<div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;">พบลูกค้า ${found.length} คน กรุณาเลือกค่ะ</div>`+
    found.map(c=>`<div onclick="selectCustomer(${JSON.stringify(c).replace(/"/g,'&quot;')})" style="padding:8px 10px;background:var(--p50);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:12px;">

      <span style="color:var(--text3);">📞 ${c.phone}</span>
    </div>`).join('');
  } else {
    currentCustomer=null;
    document.getElementById('search-results').style.display='none';
    document.getElementById('customer-found').style.display='none';
    document.getElementById('customer-notfound').style.display='block';

function clearPhoto(){
  photoData=null;
  document.getElementById('photo-preview').innerHTML='📷';
  document.getElementById('photo-name').textContent='ยังไม่ได้เลือกรูป';
  document.getElementById('btn-rp').style.display='none';
  document.getElementById('photo-input').value='';
}
function resizeImg(dataUrl,max,cb){
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.6));
  };
  img.src=dataUrl;
}
function previewPhoto(input){
  if(input.files&&input.files[0]){
    const file=input.files[0];
    document.getElementById('photo-name').textContent=file.name;
    const reader=new FileReader();
    reader.onload=e=>{
      resizeImg(e.target.result,400,resized=>{
        photoData=resized;
        document.getElementById('photo-preview').innerHTML='<img src="'+resized+'"/>';
        document.getElementById('btn-rp').style.display='inline-block';
      });
    };
    reader.readAsDataURL(file);
  }
}

function setF(f,el){
  filter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');renderList();
}
function getF(){
  if(filter==='all')return orders;
  if(filter==='active')return orders.filter(o=>['pending','washing','ironing'].includes(o.status));
  if(filter==='ready')return orders.filter(o=>o.status==='ready');
  if(filter==='urgent')return orders.filter(o=>o.urgent!=='normal');
  if(filter==='pay-wait')return orders.filter(o=>o.payment_method&&String(o.paid)!=='true');
  if(filter==='unpaid')return orders.filter(o=>String(o.paid)!=='true'&&o.status==='ready');
  return orders;
}
function fmtDate(d){
  if(!d)return'';const s=String(d);
  if(s.includes('T')){return new Date(s).toLocaleDateString('th-TH');}
  return s;
}
function renderList(){
  const active=orders.filter(o=>!['done'].includes(o.status)).length;
  const unpaid=orders.filter(o=>String(o.paid)!=='true').length;
  document.getElementById('st-total').textContent=orders.length;
  document.getElementById('st-pending').textContent=active;
  document.getElementById('st-unpaid').textContent=unpaid;
  const list=getF();
  const el=document.getElementById('order-list');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">🧺</div><p>ไม่มีรายการค่ะ</p></div>';return;}
  el.innerHTML=list.sort((a,b)=>{
    const ua=a.urgent!=='normal',ub=b.urgent!=='normal';
    if(ua&&!ub)return -1;if(!ua&&ub)return 1;return 0;
  }).map(o=>adminCardHTML(o)).join('');
}

async function updO(id,field,value){

function uploadPhoto(orderId,type){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    toast('กำลังอัปโหลดรูป...');
    const reader=new FileReader();
    reader.onload=async ev=>{
      resizeImg(ev.target.result,400,async resized=>{
        try{
          const d=await apiPost({action:'uploadPhoto',id:orderId,type,photo:resized});
          if(d.success){const o=orders.find(x=>x.id===orderId);if(o)o['photo_'+type]=d.url;renderList();toast('✓ อัปโหลดรูปแล้วค่ะ');}
          else toast('อัปโหลดไม่ได้ค่ะ','err');
        }catch(e){toast('เชื่อมต่อไม่ได้ค่ะ','err');}
      });
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

    toast('กำลังอัปโหลดสลิป...');
    const reader=new FileReader();
    reader.onload=async ev=>{
      resizeImg(ev.target.result,400,async resized=>{
        try{
          const d=await apiPost({action:'uploadPhoto',id:orderId,type:'slip',photo:resized});
          if(d.success){
            await apiGet({action:'updateOrder',id:orderId,field:'payment_method',value:'transfer'});
            toast('✓ แนบสลิปแล้วค่ะ รอร้านยืนยัน');
            initCustomer();
          }else toast('อัปโหลดไม่ได้ค่ะ','err');
        }catch(e){toast('เชื่อมต่อไม่ได้ค่ะ','err');}
      });
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// ---- EDIT CUSTOMER ----
function editCustomer(phone,name,nickname,type,source,lineid){
  document.getElementById('modal').innerHTML=`
  <div class="modal-bg" onclick="closeModal(event)">
    <div class="modal">
      <h3>✏️ แก้ไขข้อมูลลูกค้า</h3>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">
        <div class="f"><label>ชื่อ-นามสกุล</label><input class="inp" id="ec-name" value="${name}" style="margin-bottom:0;"/></div>
        <div class="f"><label>ชื่อเล่น</label><input class="inp" id="ec-nick" value="${nickname}" style="margin-bottom:0;"/></div>
        <div class="f"><label>จากที่ไหน</label><input class="inp" id="ec-source" value="${source}" style="margin-bottom:0;"/></div>
        <div class="f"><label>Line ID</label><input class="inp" id="ec-line" value="${lineid}" style="margin-bottom:0;"/></div>
        <div class="f"><label>ประเภท</label>
          <select class="inp" id="ec-type" style="margin-bottom:0;">
            <option value="daily" ${type==='daily'?'selected':''}>รายวัน</option>
            <option value="monthly" ${type==='monthly'?'selected':''}>รายเดือน</option>
          </select>
        </div>
      </div>
      <button class="btn-main" onclick="saveEditCustomer('${phone}')">✓ บันทึกการแก้ไข</button>
      <button class="btn-close-m" onclick="document.getElementById('modal').innerHTML=''">ยกเลิก</button>
    </div>
  </div>`;
}
async function saveEditCustomer(phone){
  const fields=[
    {field:'name',value:document.getElementById('ec-name').value.trim()},
    {field:'nickname',value:document.getElementById('ec-nick').value.trim()},
    {field:'source',value:document.getElementById('ec-source').value.trim()},
    {field:'lineid',value:document.getElementById('ec-line').value.trim()},
    {field:'type',value:document.getElementById('ec-type').value},
  ];
  try{
    for(const f of fields){
      await apiGet({action:'updateCustomer',phone,field:f.field,value:f.value});
    }
    document.getElementById('modal').innerHTML='';
    toast('✓ อัปเดตข้อมูลลูกค้าแล้วค่ะ');
    loadCustomers();
  }catch(e){toast('อัปเดตไม่ได้ค่ะ','err');}
}
function copyLink(link){
  navigator.clipboard.writeText(link).then(()=>toast('✓ คัดลอกลิงก์แล้วค่ะ!')).catch(()=>{
    const t=document.createElement('textarea');t.value=link;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('✓ คัดลอกแล้วค่ะ!');
  });
}
function sw(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['add','list','customers','summary','shop'][i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='list')loadOrders();
  if(name==='customers')loadCustomers();
  if(name==='summary'){loadOrders();loadSummary();}
}

// ---- SERVICE WORKER ----
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('SW registered'))
      .catch(e=>console.log('SW failed',e));
  });
}
